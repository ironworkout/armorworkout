                const chartArea = document.getElementById('stats-explorer-chart-area');
                const noData = document.getElementById('stats-explorer-no-data');
                const metaDiv = document.getElementById('stats-explorer-meta');
                if (!exerciseName) { chartArea.style.display = 'none'; noData.style.display = 'block'; return; }

                destroyChart('stats-explorer-canvas');
                chartArea.style.display = 'block';
                noData.style.display = 'none';
                renderExerciseProgressionChart('stats-explorer-canvas', exerciseName, sessionName);

                const relevantHistory = workoutHistory.filter(h => h.type === sessionName);
                const dataPoints = [];
                relevantHistory.forEach(h => {
                    const ex = (h.exercises || []).find(e => e.name === exerciseName);
                    if (ex) {
                        const score = calculatePerformanceScore(ex);
                        if (score && score > 0) dataPoints.push({
                            date: h.date, score,
                            reps: ex.finalReps || ex.reps,
                            weight: ex.finalWeightDescription || ex.weight_text
                        });
                    }
                });

                if (dataPoints.length >= 2) {
                    const first = dataPoints[0], last = dataPoints[dataPoints.length - 1];
                    const pct = Math.round(((last.score - first.score) / first.score) * 100);
                    const trendClass = pct > 5 ? 'stats-trend-up' : pct < -5 ? 'stats-trend-down' : 'stats-trend-flat';
                    const trendIcon = pct > 5 ? '↑' : pct < -5 ? '↓' : '→';
                    const isPR = last.score >= Math.max(...dataPoints.map(d => d.score));
                    const lastWeight = (last.weight || '').replace(/🏋️|🧘|💪|⚡️/g, '').trim();
                    metaDiv.innerHTML =
                        `<span class="${trendClass}">${trendIcon} ${pct > 0 ? '+' : ''}${pct}% depuis la 1ère séance</span>` +
                        `<span><i class="fas fa-calendar-alt"></i> ${dataPoints.length} séances avec données</span>` +
                        (isPR && dataPoints.length > 1 ? '<span class="stats-pr-badge">🏆 PR en cours !</span>' : '') +
                        `<span style="opacity:0.6">Dernière perf : ${last.reps || '?'} reps · ${lastWeight || '?'}</span>`;
                } else {
                    metaDiv.innerHTML = '<span style="opacity:0.6;font-size:0.85em"><i class="fas fa-info-circle"></i> Effectuez au moins 2 séances de ce type pour voir la progression</span>';
                }
            });
        }

        // Fonction modifiée pour afficher le "Spider Vibranium" (Radar Chart) avec couleurs dynamiques
        function renderGlobalPerformanceChart(canvasEl, sessionName) {
            const canvasId = canvasEl.id;
            destroyChart(canvasId);
            const placeholderEl = document.getElementById(`${canvasId}-placeholder`);
            const sessionTemplate = loadedFullProgram.sessions.find(s => s.nom_session === sessionName);
            if (!sessionTemplate) return;

            const relevantHistory = workoutHistory.filter(h => h.type === sessionName);
            const lastHistoryEntry = relevantHistory.length > 0 ? relevantHistory[relevantHistory.length - 1] : null;

            if (!lastHistoryEntry) {
                if (placeholderEl) { placeholderEl.textContent = 'Effectuez une séance pour voir le graphique Vibranium.'; placeholderEl.style.display = 'flex'; }
                return;
            }

            if (placeholderEl) placeholderEl.style.display = 'none';

            // Identifier les exercices uniques pour le radar
            const exerciseLabels = [...new Set(sessionTemplate.exercices_et_pauses.filter(ex => ex.type.startsWith('exercise')).map(ex => ex.name))];
            
            // Calculer les % de réussite pour chaque axe
            const achievementData = exerciseLabels.map(exName => {
                const exTemplate = sessionTemplate.exercices_et_pauses.find(ex => ex.name === exName);
                if (!exTemplate) return 0;

                const targetWeightText = exTemplate.final_target_poids || "";
                const targetReps = parseInt(exTemplate.final_target_reps) || 12;
                const targetWeight = parseWeightValue(targetWeightText);
                const targetScore = Math.pow(targetWeight || 25, 1.05) * targetReps;

                const exData = lastHistoryEntry.exercises.find(ex => ex.name === exName);
                const currentScore = calculatePerformanceScore(exData) || 0;

                if (targetScore === 0) return 0;
                return (currentScore / targetScore) * 100;
            });

            // Couleurs Dynamiques "Addictives" selon la Ligue CSS actuelle
            const electricBlueColor = getComputedStyle(document.body).getPropertyValue('--electric-blue').trim();
            const neonPurpleColor = getComputedStyle(document.body).getPropertyValue('--neon-purple').trim();
            const neonGoldColor = '#FFD700'; // Vibranium
            const gridColor = getComputedStyle(document.documentElement).getPropertyValue('--border-color-dark').trim() + '80';
            const textColor = getComputedStyle(document.documentElement).getPropertyValue('--secondary-text-color').trim();
            
            // Logique de couleur par point (Progression)
            const pointColors = achievementData.map(val => {
                if (val >= 100) return neonGoldColor; // Vibranium
                if (val >= 75) return neonPurpleColor; // Elite
                return electricBlueColor; // Standard
            });

            const pointStyles = achievementData.map(val => val >= 100 ? 'star' : 'circle');
            const pointSizes = achievementData.map(val => val >= 100 ? 8 : 4);

            const ctx = canvasEl.getContext('2d');
            activeCharts[canvasId] = new Chart(ctx, {
                type: 'radar',
                data: {
                    labels: exerciseLabels.map(name => name.substring(0, 15) + (name.length > 15 ? '...' : '')),
                    datasets: [{
                        label: 'Maîtrise (%)',
                        data: achievementData,
                        fill: true,
                        backgroundColor: electricBlueColor + '20', 
                        borderColor: electricBlueColor,
                        pointBackgroundColor: pointColors,
                        pointBorderColor: '#fff',
                        pointHoverBackgroundColor: '#fff',
                        pointHoverBorderColor: pointColors,
                        pointStyle: pointStyles,
                        pointRadius: pointSizes,
                        pointHoverRadius: pointSizes.map(s => s + 2),
                        borderWidth: 2
                    }]
                },
                options: {
                    responsive: true, maintainAspectRatio: false,
                    scales: {
                        r: {
                            angleLines: { color: gridColor },
                            grid: { color: gridColor },
                            pointLabels: { color: textColor, font: { size: 10 } },
                            ticks: { display: false, backdropColor: 'transparent' },
                            suggestedMin: 0,
                            suggestedMax: 100
                        }
                    },
                    plugins: {
                        legend: { display: false },
                        tooltip: {
                            callbacks: {
                                label: (context) => {
                                    let val = context.raw.toFixed(0);
                                    let status = val >= 100 ? "VIBRANIUM 🌟" : (val >= 75 ? "ELITE 🔥" : "En cours");
                                    return `${val}% - ${status}`;
                                }
                            }
                        }
                    }
                }
            });
        }

        // ── Fenêtres de reps par exercice (fibres musculaires) ────────────────────────
        const LG_EX = {
          dev_mil:   {name:"Dév. Militaire",      muscle:"epaules",       bag:false, repsOpt:[5,8,12,16],   fiberNote:"Deltoïde antérieur : 55% fibres rapides. Zone 8-12r.",  adviceHigh:"Fibres rapides — ne dépasse pas 15r. Monte le poids.",  adviceLow:"Trop lourd — passe à 8-12r.", s:[{p:10,r:8},{p:18,r:10},{p:25,r:10},{p:35,r:12},{p:45,r:12}]},
          elev_lat:  {name:"Élév. Lat.",           muscle:"epaules",       bag:true,  repsOpt:[10,15,25,35], fiberNote:"Deltoïde médial : ~60% fibres lentes. Zone 15-25r OPTIMALE.", adviceHigh:"Fibres lentes — monte le poids seulement au-delà de 25r.", adviceLow:"Trop lourd. Zone cible 15-25r.", s:[{p:3,r:12},{p:5,r:15},{p:7.5,r:18},{p:11,r:20},{p:15,r:25}]},
          face_pull: {name:"Face Pulls",           muscle:"epaules",       bag:false, repsOpt:[12,15,25,35], fiberNote:"Deltoïde postérieur : ~65% fibres lentes. Zone 15-25r.", adviceHigh:"Continue jusqu'à 25r avant de monter le poids.", adviceLow:"Trop lourd. Zone 15-25r.", s:[{p:10,r:15},{p:18,r:18},{p:24,r:20},{p:32,r:22},{p:40,r:25}]},
          elev_vol:  {name:"Élév. Volume",         muscle:"epaules",       bag:false, repsOpt:[15,20,30,40], fiberNote:"Congestion — fibres lentes. Zone 20-30r.", adviceHigh:"Au-delà de 30r c'est du cardio. Monte le poids.", adviceLow:"Séries longues 20-30r.", s:[{p:2,r:18},{p:4,r:22},{p:6,r:25},{p:9,r:28},{p:12,r:30}]},
          tirage_v:  {name:"Tirage Vertical",      muscle:"dos_largeur",   bag:false, repsOpt:[6,8,15,20],   fiberNote:"Grand dorsal : 50/50 fibres. Zone 8-15r.", adviceHigh:"Ne dépasse pas 15r — monte le poids.", adviceLow:"Zone 8-15r.", s:[{p:10,r:8},{p:18,r:10},{p:25,r:12},{p:35,r:12},{p:45,r:12}]},
          rowing_sb: {name:"Rowing Swiss Ball",    muscle:"dos_epaisseur", bag:false, repsOpt:[8,10,16,22],  fiberNote:"Milieu dos : légèrement rapide. Zone 10-16r.", adviceHigh:"Au-delà de 16r, fatigue posturale. Monte le poids.", adviceLow:"Zone 10-16r.", s:[{p:12,r:10},{p:20,r:12},{p:28,r:14},{p:36,r:14},{p:42,r:16}]},
          pompes_sur:{name:"Pompes Pieds Surél.",  muscle:"pecs",          bag:true,  repsOpt:[5,6,12,16],   fiberNote:"Pecs supérieurs : ~60% fibres rapides. Zone 6-12r.", adviceHigh:"12r = plafond pecs. Monte le poids.", adviceLow:"Zone 6-12r.", s:[{p:3,r:8},{p:6,r:9},{p:11,r:10},{p:18,r:11},{p:26,r:12}]},
          pompes_cl: {name:"Pompes Lestées",       muscle:"pecs",          bag:true,  repsOpt:[5,6,12,16],   fiberNote:"Pectoraux : fibres rapides dominantes. Zone 6-12r.", adviceHigh:"Au-delà de 12r → monte le poids.", adviceLow:"Zone 6-12r.", s:[{p:3,r:8},{p:6,r:10},{p:10,r:10},{p:18,r:12},{p:26,r:12}]},
          ext_tri:   {name:"Ext. Triceps",         muscle:"triceps",       bag:false, repsOpt:[8,10,15,20],  fiberNote:"Triceps : chefs mixtes. Zone 10-15r.", adviceHigh:"15r = plafond triceps. Monte le poids.", adviceLow:"Zone 10-15r.", s:[{p:8,r:10},{p:15,r:12},{p:22,r:13},{p:30,r:15},{p:38,r:15}]},
          curl_m:    {name:"Curl Marteau",         muscle:"biceps",        bag:false, repsOpt:[8,10,15,20],  fiberNote:"Biceps / brachial : mixte. Zone 10-15r.", adviceHigh:"15r = haut de zone. Monte le poids.", adviceLow:"Zone 10-15r.", s:[{p:8,r:10},{p:15,r:12},{p:20,r:12},{p:28,r:12},{p:35,r:12}]},
          finisher:  {name:"Curl Concentré",       muscle:"biceps",        bag:false, repsOpt:[10,12,20,28], fiberNote:"Isolation / congestion. Zone 12-20r.", adviceHigh:"20r max finisher. Monte le poids.", adviceLow:"Zone 12-20r.", s:[{p:8,r:12},{p:15,r:14},{p:20,r:15},{p:28,r:15},{p:35,r:15}]}
        };

        // Mapping nom exercice programme → ID LG_EX
        // lgMapName — ordre CRITIQUE : le plus spécifique en premier
        // FINISHER/concentré AVANT swiss (sinon 'Curl Concentré (Swiss Ball)' → rowing_sb)
        function lgMapName(name) {
          if (!name) return null;
          const n = name.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'');
          // Finisher/concentré en tout premier (contient 'swiss ball' mais est un curl)
          if (n.includes('finisher') || n.includes('concentre') || n.includes('concentr')) return 'finisher';
          if (n.includes('vol.')  || n.includes('(vol')) return 'elev_vol';
          if (n.includes('militaire'))                   return 'dev_mil';
          if (n.includes('face pull'))                   return 'face_pull';
          if (n.includes('lateral') || n.includes('laterale')) return 'elev_lat';
          if (n.includes('tirage'))                      return 'tirage_v';
          if (n.includes('rowing') || n.includes('swiss')) return 'rowing_sb';
          if (n.includes('sureleve') || n.includes('surel') || n.includes('surele')) return 'pompes_sur';
          if (n.includes('triceps'))                     return 'ext_tri';
          if (n.includes('marteau'))                     return 'curl_m';
          if (n.includes('classique') || n.includes('lestee') || n.includes('leste')) return 'pompes_cl';
          return null;
        }

        // Pondérations visuelles (Tovée 1999, Dixson 2007, Hughes & Gallup 2003)
        const LG_W = { epaules:.32, pecs:.20, triceps:.15, dos_largeur:.13, dos_epaisseur:.10, biceps:.10 };
        const LG_ML = { epaules:"Épaules", pecs:"Pecs", triceps:"Triceps", dos_largeur:"Dos largeur", dos_epaisseur:"Grand dorsal", biceps:"Biceps" };
        const LG_EASTPACK = 1.28;

        // 13 Ligues score-based
        const LG_TIERS = [
          {id:"B1",n:"Bronze I",   r:[0,8],   lvl:0,ca:"#D4895A",cb:"#3A1A08",glow:"#E8A870",wks:0,  star:"T. Chalamet (2018)",    desc:"Corps fin. Silhouette neutre. Aucun volume."},
          {id:"B2",n:"Bronze II",  r:[8,15],  lvl:0,ca:"#E09858",cb:"#4A2210",glow:"#F0B478",wks:8,  star:"T. Chalamet (2022)",    desc:"Légère tonicité. Aucun V-taper."},
          {id:"B3",n:"Bronze III", r:[15,22], lvl:0,ca:"#F0A868",cb:"#5A2A18",glow:"#FFBE88",wks:16, star:"J. Elordi (début)",      desc:"Épaules légèrement plus larges que les hanches."},
          {id:"A1",n:"Argent I",   r:[22,30], lvl:1,ca:"#C8C8C8",cb:"#2A2A2A",glow:"#E8E8E8",wks:24, star:"T. Chalamet (Dune)",    desc:"Deltoïde naissant. V-frame discret."},
          {id:"A2",n:"Argent II",  r:[30,37], lvl:1,ca:"#DCDCDC",cb:"#383838",glow:"#F8F8F8",wks:32, star:"J. Elordi (entraîné)",  desc:"T-shirt M commence à être rempli."},
          {id:"A3",n:"Argent III", r:[37,44], lvl:1,ca:"#F0F0F0",cb:"#484848",glow:"#FFFFFF",wks:40, star:"Paul Mescal",            desc:"V-frame naissant. Présence affirmée."},
          {id:"O1",n:"Or I",       r:[44,52], lvl:2,ca:"#FFD740",cb:"#3A2008",glow:"#FFE880",wks:48, star:"T. Holland (t-shirt)",  desc:"Épaules dépassent les hanches. Athlétique visible."},
          {id:"O2",n:"Or II",      r:[52,60], lvl:2,ca:"#FFE050",cb:"#483010",glow:"#FFF090",wks:56, star:"T. Holland (prépa)",    desc:"V-frame marqué. Bras imposants."},
          {id:"O3",n:"Or III",     r:[60,68], lvl:2,ca:"#FFF060",cb:"#583A18",glow:"#FFFF96",wks:64, star:"Zac Efron (civil)",     desc:"Chest visible. Vêtements changent."},
          {id:"P1",n:"Platine I",  r:[68,76], lvl:3,ca:"#40F090",cb:"#001A08",glow:"#60FFB0",wks:76, star:"T. Holland (Uncharted)", desc:"V-frame imposant. Manches tirent."},
          {id:"P2",n:"Platine II", r:[76,84], lvl:3,ca:"#30FFB0",cb:"#002818",glow:"#50FFC8",wks:88, star:"Zac Efron (Baywatch)",  desc:"Physique de film."},
          {id:"P3",n:"Platine III",r:[84,92], lvl:3,ca:"#20FFC8",cb:"#003820",glow:"#40FFE0",wks:100,star:"H. Cavill (habillé)",   desc:"Impossible à cacher."},
          {id:"V", n:"Vibranium",  r:[92,100],lvl:4,ca:"#D060FF",cb:"#150030",glow:"#F090FF",wks:120,star:"C. Evans / Hemsworth",  desc:"Max home gym. Imposant habillé."}
        ];

        // Score functions
        function lgFReps(r, opt) {
          const [mn,lo,hi,mx]=opt;
          if(r<mn) return r*.65;
          if(r<=lo) return r*(.75+.25*(r-mn)/(lo-mn));
          if(r<=hi) return r;
          if(r<=mx) return hi+(r-hi)*.5;
          return hi+(mx-hi)*.5+(r-mx)*.1;
        }
        function lgSc(p,r,id){ const ex=LG_EX[id]; return Math.pow(Math.max(0,p),1.05)*lgFReps(r,ex.repsOpt)*(ex.bag?LG_EASTPACK:1); }
        function lgNorm(id,cur){
          const ex=LG_EX[id],s=ex.s;
          const sC=lgSc(cur.p,cur.r,id),sB=lgSc(s[0].p,s[0].r,id),sV=lgSc(s[4].p,s[4].r,id);
          return sV<=sB?0:Math.max(0,Math.min(100,(sC-sB)/(sV-sB)*100));
        }

        // Extraire les dernières perf par exercice depuis l'historique Drive
        function lgExtractLatestPerfs() {
          const latest = {};
          if (!workoutHistory) return latest;
          workoutHistory.forEach(session => {
            (session.exercises || []).forEach(ex => {
              const id = lgMapName(ex.name);
              if (!id) return;
              // Parse le poids depuis finalWeightDescription ou weight_description_target
              const wDesc = ex.finalWeightDescription || ex.weight_description_target || '';
              const wMatch = wDesc.match(/(\d+[.,]?\d*)\s*kg/i);
              // Si pas de kg dans la description (ex: '🟪 Tension Max'), on prend le bronze comme fallback
              const p = wMatch ? parseFloat(wMatch[1].replace(',','.')) : LG_EX[id].s[0].p;
              const r = ex.finalReps || (typeof ex.reps_target === 'number' ? ex.reps_target : null) || LG_EX[id].s[0].r;
              // Toujours enregistrer si on a au moins les reps réelles
              if (r > 0) {
                if (!latest[id] || lgSc(p,r,id) > lgSc(latest[id].p,latest[id].r,id)) {
                  latest[id] = {p, r};
                }
              }
            });
          });
          return latest;
        }
        // Calcule la vitesse réelle de progression depuis l'historique Drive
        // Méthode : compare le score moyen des 4 premières séances vs les 4 dernières
        function lgComputeRealSpeed() {
          // Vitesse de progression du score ligue (%/semaine)
          // Basée sur : sessions/semaine × gain moyen par session
          // Gain par session calibré sur la littérature hypertrophique (Schoenfeld 2010) :
          //   - Phase 1 (0-6 mois) : ~0.65% de score ligue par séance
          //   - Phase 2 (6-12 mois) : ~0.40% par séance (adaptation neuromusculaire complète)
          //   - Phase 3 (>12 mois) : ~0.25% par séance
          if (!workoutHistory || workoutHistory.length < 2) return 1.3;
          const sorted = workoutHistory.slice().sort((a,b) => new Date(a.date) - new Date(b.date));
          const first = sorted[0], last = sorted[sorted.length - 1];
          const totalWeeks = Math.max(1, (new Date(last.date) - new Date(first.date)) / (7 * 86400000));
          const totalMonths = totalWeeks / 4.33;
          const sessionsPerWeek = sorted.length / totalWeeks;
          // Gain par séance selon la phase
          const gainPerSession = totalMonths < 6 ? 0.65 : totalMonths < 12 ? 0.40 : 0.25;
          const speed = sessionsPerWeek * gainPerSession;
          return Math.round(Math.max(0.3, Math.min(3.5, speed)) * 10) / 10;
        }

        function lgGetRealPerfsKeys() {
          // Returns list of exercise IDs that have REAL Drive history data
          const keys = new Set();
          if (!workoutHistory) return [];
          workoutHistory.forEach(session => {
            (session.exercises || []).forEach(ex => {
              const id = lgMapName(ex.name);
              if (!id) return;
              const wDesc = ex.finalWeightDescription || ex.weight_description_target || '';
              const wMatch = wDesc.match(/(\d+[.,]?\d*)\s*kg/i);
              if (wMatch) keys.add(id);
            });
          });
          return Array.from(keys);
        }

        // Calcul du score global depuis les perfs réelles
        function lgComputeAll(perfs) {
          const raw={},cnt={};
          Object.keys(LG_EX).forEach(id => {
            const m=LG_EX[id].muscle;
            const cur = perfs[id] || {p:LG_EX[id].s[0].p, r:LG_EX[id].s[0].r};
            const v = lgNorm(id,cur);
            raw[m]=(raw[m]||0)+v; cnt[m]=(cnt[m]||0)+1;
          });
          const muscles={};
          Object.keys(raw).forEach(m=>{muscles[m]=raw[m]/cnt[m];});
          const global=Object.entries(LG_W).reduce((s,[m,w])=>s+(muscles[m]||0)*w,0);
          return{global:Math.round(global*10)/10, muscles};
        }

        function lgGetTier(s){return LG_TIERS.find(t=>s>=t.r[0]&&s<t.r[1])||LG_TIERS[12];}
        function lgGetTierIdx(s){const i=LG_TIERS.findIndex(t=>s>=t.r[0]&&s<t.r[1]);return i<0?12:i;}
        function lgPctInTier(s,t){return Math.max(0,Math.min(100,Math.round((s-t.r[0])/(t.r[1]-t.r[0])*100)));}

        // Conseiller : que faire pour un exercice donné ?
        function lgGetAdvice(id,cur){
          const ex=LG_EX[id],[mn,lo,hi,mx]=ex.repsOpt;
          const z=cur.r<mn?'TROP_LOURD':cur.r<=lo?'BAS_OPT':cur.r<=hi?'OPTIMAL':cur.r<=mx?'HAUT_OPT':'TROP_LEGER';
          const nxtP=ex.s.find(s=>s.p>cur.p);
          switch(z){
            case 'TROP_LOURD': return{z,col:'#F87171',icon:'⬇️',pri:'URGENT',title:'Descends le poids — hors zone hypertrophique',conseil:`${cur.r}r = zone force pure (min : ${mn}r). Descends le poids pour atteindre ${lo}-${hi}r.`,next:`Cible : ~${lo}r avec technique parfaite.`};
            case 'BAS_OPT':    return{z,col:'#93C5FD',icon:'📈',pri:'NORMAL',title:'Augmente les reps en priorité',conseil:`${cur.r}/${hi}r cible. Progresse d'abord en reps jusqu'à ${hi}. Consolider avant d'augmenter la charge.`,next:`Objectif : ${hi}r à ${cur.p}kg.`};
            case 'OPTIMAL':    return{z,col:'#6EE7B7',icon:'✅',pri:'GOOD',title:'Dans la zone optimale — continue',conseil:ex.fiberNote,next:cur.r<hi?`${hi-cur.r}r à gagner avant de monter le poids.`:nxtP?`Signal : passe à ${nxtP.p}kg.`:'Vibranium sur cet exercice !'};
            case 'HAUT_OPT':   return{z,col:'#FCD34D',icon:'⬆️',pri:'ACTION',title:'Monte le poids maintenant',conseil:ex.adviceHigh,next:nxtP?`Passe à ${nxtP.p}kg et reviens à ~${lo}r.`:'Prévoir changement de matériel.'};
            case 'TROP_LEGER': return{z,col:'#F87171',icon:'🔴',pri:'URGENT',title:'Trop de reps — monte le poids',conseil:`${cur.r}r > plafond (${mx}r). Endurance, plus hypertrophie. Monte le poids.`,next:nxtP?`Passe à ${nxtP.p}kg × ${lo}r.`:'Prévoir changement de matériel.'};
          }
        }

        // Détection alertes
        // realPerfs = perfs qui viennent vraiment de l'historique Drive (pas du fallback DEMO)
        function lgDetectAlerts(perfs, realPerfsKeys) {
          const alerts = [];
          const hasRealData = realPerfsKeys && realPerfsKeys.length > 0;
          Object.entries(perfs).forEach(([id,cur]) => {
            const ex=LG_EX[id]; if(!ex) return;
            // N'alerter que si cet exercice a de vraies données Drive
            if (hasRealData && !realPerfsKeys.includes(id)) return;
            const [mn,,hi,mx]=ex.repsOpt;
            if(cur.r < mn) alerts.push({
              icon:'⚡', col:'#F87171',
              title:`Zone force pure : ${ex.name}`,
              body:`${cur.r} reps < minimum (${mn}r) pour ce muscle. Tu développes la force, pas la masse. Descends le poids pour viser ${lo}-${hi}r.`
            });
            if(cur.r > mx) alerts.push({
              icon:'📉', col:'#93C5FD',
              title:`Trop de reps : ${ex.name}`,
              body:`${cur.r} reps dépasse le plafond (${mx}r). Fatigue métabolique > tension mécanique = pas d'hypertrophie. Monte le poids, reviens à ~${hi}r.`
            });
            // Plafond matériel : seulement si on est vraiment proche ET qu'on a des données réelles
            if(hasRealData && cur.p >= ex.s[4].p * 0.85) alerts.push({
              icon:'🔧', col:'#FCD34D',
              title:`Approche du plafond matériel : ${ex.name}`,
              body:`${cur.p}kg = ${Math.round(cur.p/ex.s[4].p*100)}% du maximum élastique/sac (${ex.s[4].p}kg). Dans quelques progressions tu atteindras la limite. Anticiper : haltères ajustables ou abonnement salle.`
            });
          });
          return alerts;
        }

        // Badge SVG hexagonal électrique
        function lgRenderBadgeSVG(tier, size, active) {
          const {id,lvl,ca,cb,glow}=tier;
          const uid=`bg${id}`;
          const hex=(r,cx=50,cy=50)=>Array.from({length:6},(_,i)=>{const a=(i*60-30)*Math.PI/180;return`${cx+r*Math.cos(a)},${cy+r*Math.sin(a)}`;}).join(' ');
          const isV=lvl===4,isP=lvl>=3,isO=lvl>=2,isA=lvl>=1;

                .lrc-${uid}{transform-origin:50px 50px;animation:rot${uid} ${dur*.5}s linear infinite}
                .lpu-${uid}{animation:pu${uid} ${isV?.9:1.8}s ease-in-out infinite}
                .lfl-${uid}{animation:fl${uid} .22s ease-in-out infinite}
                .lsc-${uid}{transform-origin:50px 50px;animation:sc${uid} 2.5s ease-in-out infinite}
                .lgp-${uid}{animation:gp${uid} .9s ease-in-out infinite}
              </style>
              <filter id="lgf${uid}" x="-50%" y="-50%" width="200%" height="200%">
                <feGaussianBlur stdDeviation="${isV?5:isP?3.5:isO?2.5:1.5}" result="b"/>
                <feComposite in="SourceGraphic" in2="b" operator="over"/>
              </filter>
              <radialGradient id="lrg${uid}" cx="50%" cy="35%">
                <stop offset="0%" stop-color="${ca}" stop-opacity=".3"/>
                <stop offset="70%" stop-color="${cb}" stop-opacity=".15"/>
              </radialGradient>
              <linearGradient id="lbolt${uid}" x1="0" y1="0" x2="0" y2="1">
                <stop offset="0%" stop-color="#FFF" stop-opacity=".98"/>
                <stop offset="35%" stop-color="${ca}"/>
                <stop offset="100%" stop-color="${ca}" stop-opacity=".5"/>
              </linearGradient>
            </defs>
            <g filter="${active||isO?`url(#lgf${uid})`:''}">
              ${isA?`<g class="lra-${uid}"><polygon points="${hex(47)}" fill="none" stroke="${ca}" stroke-width=".8" stroke-dasharray="7 16" opacity=".45"/></g>`:''}
              ${isO?`<g class="lrb-${uid}"><polygon points="${hex(44)}" fill="none" stroke="${ca}" stroke-width="1.1" stroke-dasharray="4 22" opacity=".55"/></g>
              <g class="lra-${uid}" style="animation-duration:${dur*1.5}s"><circle cx="50" cy="50" r="47" fill="none" stroke="${ca}" stroke-width=".5" stroke-dasharray="3 28" opacity=".3"/></g>`:''}
              ${isP?`<g class="lrc-${uid}"><polygon points="${hex(41)}" fill="none" stroke="white" stroke-width=".6" stroke-dasharray="4 24" opacity=".25"/></g>
              <g class="lra-${uid}" style="animation-duration:${dur*.6}s"><circle cx="50" cy="50" r="48" fill="none" stroke="${ca}" stroke-width=".8" stroke-dasharray="3 5" opacity=".55"/></g>`:''}
              ${isV?`<g class="lra-${uid}" style="animation-duration:1.5s"><circle cx="50" cy="50" r="48" fill="none" stroke="${ca}" stroke-width="1.4" stroke-dasharray="3 6" opacity=".75"/></g>
              <g class="lrb-${uid}" style="animation-duration:1s"><circle cx="50" cy="50" r="44" fill="none" stroke="white" stroke-width=".9" stroke-dasharray="2 9" opacity=".45"/></g>
              ${[0,60,120,180,240,300].map((a,i)=>`<circle cx="${50+46*Math.cos(a*Math.PI/180)}" cy="${50+46*Math.sin(a*Math.PI/180)}" r="2" fill="${ca}" class="lgp-${uid} lpu-${uid}" style="animation-delay:${i*.18}s"/>`).join('')}`:''}
              <polygon points="${hex(37,52,52)}" fill="rgba(0,0,0,.5)" opacity=".35"/>
              <polygon points="${hex(37)}" fill="url(#lrg${uid})" stroke="${ca}" stroke-width="${isV?2.2:isP?1.8:isO?1.5:1.2}" opacity=".97"/>
              <polygon points="${hex(30)}" fill="none" stroke="${ca}" stroke-width=".7" opacity="${.2+lvl*.12}"/>

            return r ? parseInt(r[1],16)+', '+parseInt(r[2],16)+', '+parseInt(r[3],16) : '34, 211, 238';

        // Moteur d'Assiduité : Calcul des semaines consécutives (>= 2 séances)
        function calculateWeeklyStreak() {
            if (workoutHistory.length < 2) return 0;
            const weeklyGoal = 2; // Calibré sur 2 séances
            const workoutsByWeek = {};
            workoutHistory.forEach(h => {
                const d = new Date(h.date + 'T00:00:00');
                const firstDayOfWeek = new Date(d);
                firstDayOfWeek.setDate(d.getDate() - (d.getDay() === 0 ? 6 : d.getDay() - 1));
                firstDayOfWeek.setHours(0,0,0,0);
                const weekKey = firstDayOfWeek.toLocaleDateString('sv-SE');
                if (!workoutsByWeek[weekKey]) workoutsByWeek[weekKey] = 0;
                workoutsByWeek[weekKey]++;
            });
            
            let streak = 0;
            let currentWeek = new Date();
            currentWeek.setDate(currentWeek.getDate() - (currentWeek.getDay() === 0 ? 6 : currentWeek.getDay() - 1));
            currentWeek.setHours(0,0,0,0);

            const currentWeekKey = currentWeek.toLocaleDateString('sv-SE');
            let lastWeek = new Date(currentWeek); lastWeek.setDate(lastWeek.getDate() - 7);
            const lastWeekKey = lastWeek.toLocaleDateString('sv-SE');

            let weekToStart = null;
            if (workoutsByWeek[currentWeekKey] >= weeklyGoal) { weekToStart = currentWeek; } 
            else if (workoutsByWeek[lastWeekKey] >= weeklyGoal) { weekToStart = lastWeek; } 
            else { return 0; }
            
            streak = 1;
            let previousWeek = new Date(weekToStart);
            while (true) {
                previousWeek.setDate(previousWeek.getDate() - 7);
                const previousWeekKey = previousWeek.toLocaleDateString('sv-SE');
                if (workoutsByWeek[previousWeekKey] >= weeklyGoal) { streak++; } else { break; }
            }
            return streak;
        }
        
        function parseRepRange(item) {
            const note = item.progression_note || '';
            const match = note.match(/Reps:\s*(\d+)\s*-\s*(\d+)/i);
            if (match) { return { min: parseInt(match[1], 10), max: parseInt(match[2], 10) }; }
            const repValue = item.reps !== undefined ? parseInt(item.reps, 10) : ((item.duration !== undefined) ? item.duration : 8);
            return { min: repValue, max: repValue };
        }

        const resistanceTypes = { 'poids': { emoji: '🏋️', text: 'Poids' }, 'elastique': { emoji: '🧘', text: 'Élastique' }, 'pdc': { emoji: '💪', text: 'Poids du Corps' }, 'poids_elastique': { emoji: '⚡️', text: 'Poids + Élastique' }};
        
        function parseWeightDescription(desc) {
            if (!desc) return { type: 'pdc', value: 0 };
            const descLower = desc.toLowerCase();
            const valueMatch = desc.match(/(\d+([.,]\d+)?)/);
            const value = valueMatch ? parseFloat(valueMatch[1].replace(',', '.')) : 0;
            if (desc.includes('💪') || descLower.includes('pdc') || descLower.includes('corps')) return { type: 'pdc', value: 0 };
            if (desc.includes('⚡️')) return { type: 'poids_elastique', value: value };
            if (desc.includes('🧘') || descLower.includes('élastique')) return { type: 'elastique', value: value };
            if (desc.includes('🏋️') || descLower.includes('kg') || value > 0) return { type: 'poids', value: value };
            return { type: 'pdc', value: 0 };
        }

                try {

                    if (savedState.version !== IN_PROGRESS_VERSION) {
                        console.warn(`Version de l'état local (${savedState.version}) obsolète. L'état est ignoré.`);

                        return;

                const planItemToUpdate = loadedFullProgram.sessions[sessionIndex].exercices_et_pauses[planIndex];

                // Null-safe reads — these elements may not exist in the simplified summary
                const repsTimeEl    = item.querySelector('[data-type="reps-time"] .stepper-value');
                const weightInputEl = item.querySelector('.simple-input[data-target-type="weight"]');

                const repsTimeValue = repsTimeEl   ? parseInt(repsTimeEl.textContent, 10)    : (planItemToUpdate.reps || planItemToUpdate.duration || 0);
                const resistanceType= resSelectorEl ? resSelectorEl.dataset.type              : null;
                const weightValue   = weightStepEl  ? parseFloat(weightStepEl.textContent)    : 0;
                const trackingType  = trackingEl    ? trackingEl.dataset.value                : (planItemToUpdate.duration !== undefined ? 'time' : 'reps');

                // Final targets: keep existing if no input in DOM
                const newFinalWeight = weightInputEl ? weightInputEl.value : (planItemToUpdate.final_target_poids || '');
                const newFinalReps   = repsInputEl   ? repsInputEl.value   : (planItemToUpdate.final_target_reps  || '');

                let newWeightText = planItemToUpdate.weight_text; // default: keep existing
                if (resistanceType) {
                    switch (resistanceType) {
                        case 'poids':          newWeightText = `🏋️ ${weightValue} kg`; break;
                        case 'elastique':      newWeightText = `🧘 Élastique ${weightValue}kg`; break;
                        case 'pdc':            newWeightText = '💪 Poids du Corps'; break;
                        case 'poids_elastique':newWeightText = `⚡️ ${weightValue} kg`; break;
                    }
                }
        
                planItemToUpdate.weight_text = newWeightText;
                planItemToUpdate.final_target_poids = newFinalWeight;
                planItemToUpdate.final_target_reps = newFinalReps;
        
                delete planItemToUpdate.unit;
                delete planItemToUpdate.weight;
        
                if (trackingType === 'time') {
                    planItemToUpdate.duration = repsTimeValue;
                    delete planItemToUpdate.reps;
                } else {
                    planItemToUpdate.reps = repsTimeValue;
                    delete planItemToUpdate.duration;
                }
        
                if (isWorkoutMode && latestWorkoutEntry?.exercises) {
                    const exerciseLog = latestWorkoutEntry.exercises.find(ex => ex.originalPlanIndex === planIndex);
                    if(exerciseLog) {
                        exerciseLog.finalWeightDescription = newWeightText;
                        if (trackingType === 'time') {
                            exerciseLog.finalDuration = repsTimeValue;
                            delete exerciseLog.finalReps;
                        } else {
                            exerciseLog.finalReps = repsTimeValue;
                            delete exerciseLog.finalDuration;
                        }
                    }
                }
            });
        
            // Sauvegardes robustes avec await + feedback d'erreur

        function createUpcomingExercisesHtml(fromIndex) {
            const upcomingItems = [];
            let exerciseCount = 0;
            for (let i = fromIndex + 1; i < currentWorkoutPlan.length && exerciseCount < 3; i++) {
                const it = currentWorkoutPlan[i];
                if (it.type.startsWith('exercise')) {
                    exerciseCount++;
                    upcomingItems.push({ item: it, idx: i });
                }
            }
            if (upcomingItems.length === 0) {
                return `<div class="break-info" style="border-color: var(--color-break);"><i class="fas fa-coffee" style="color: var(--color-break)"></i><span>Dernière pause !</span></div>`;
            }
            const firstEx = upcomingItems[0];
            const firstDynamicSets = getDynamicSetsInfo(firstEx.idx);
            let html = createNextExercisePreviewHtml(firstEx.item, 'break', firstDynamicSets);
            if (upcomingItems.length > 1) {
                html += `<ul class="upcoming-exercises-list">`;
                upcomingItems.slice(1).forEach((entry, i) => {
                    const setsInfo = getDynamicSetsInfo(entry.idx);
                    const reps = getFormattedReps(entry.item);
                    const weight = getFormattedWeight(entry.item);
                    const weightClean = weight.trim() !== '💪 Poids du Corps' ? weight.replace(/🏋️|🧘|💪|⚡️/g, '').trim() : '';
                    const meta = [setsInfo, reps, weightClean].filter(Boolean).join(' · ');
                    html += `<li class="upcoming-exercise-item">
                        <span class="upcoming-idx">${i + 2}</span>
                        <span class="upcoming-name">${entry.item.name}</span>
                        <span class="upcoming-meta">${meta}</span>
                    </li>`;
                });
                html += `</ul>`;
            }
            return html;
        }

        function renderExerciseProgressionChart(canvasId, exerciseName, sessionName) {
            destroyChart(canvasId);
            const container = document.getElementById(`${canvasId}`.replace('prog-chart-', 'prog-chart-container-'));
            const ctx = document.getElementById(canvasId)?.getContext('2d');
            if (!ctx) return;

            const relevantHistory = workoutHistory.filter(h => h.type === sessionName);
            const dataPoints = [];
            relevantHistory.forEach(h => {
                const ex = (h.exercises || []).find(e => e.name === exerciseName);
                if (ex) {
                    const score = calculatePerformanceScore(ex);
                    const d = new Date(h.date + 'T00:00:00');
                    if (score !== null && score > 0) {
                        dataPoints.push({ x: d.toLocaleDateString('fr-FR', { day: '2-digit', month: '2-digit' }), y: Math.round(score) });
                    }
                }
            });

            if (dataPoints.length < 2) {
                if (container) container.innerHTML = `<p style="text-align:center;color:var(--secondary-text-color);font-size:0.85em;padding:15px 0;">Pas assez de données (min. 2 séances pour cet exercice).</p>`;
                return;
            }

            const electricCyan = getComputedStyle(document.body).getPropertyValue('--electric-cyan').trim();
            const isImproving = dataPoints[dataPoints.length - 1].y >= dataPoints[0].y;
            const lineColor = isImproving ? '#39FF14' : '#FF3131';

            activeCharts[canvasId] = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: dataPoints.map(p => p.x),
                    datasets: [{
                        label: 'Score', data: dataPoints.map(p => p.y),
                        borderColor: lineColor, backgroundColor: lineColor + '20',
                        fill: true, tension: 0.35, pointRadius: 4,
                        pointBackgroundColor: lineColor, pointBorderColor: '#000', pointBorderWidth: 1
                    }]
                },
                options: {
                    responsive: true, maintainAspectRatio: false,
                    scales: {
                        y: { beginAtZero: false, ticks: { color: '#A0AEC0', font: { size: 9 } }, grid: { color: 'rgba(255,255,255,0.07)' } },
                        x: { ticks: { color: '#A0AEC0', font: { size: 9 } }, grid: { display: false } }
                    },
                    plugins: {
                        legend: { display: false },
                        tooltip: { callbacks: { label: ctx => `Score: ${ctx.raw}` } }
                    }
                }
            });
        }

            const deleteCalendarBtn = e.target.closest('.delete-workout-btn');

                const date = deleteCalendarBtn.dataset.date;
                const formattedDate = new Date(date + 'T00:00:00').toLocaleDateString('fr-FR', {day: '2-digit', month: 'long'});
                if (confirm(`Voulez-vous vraiment supprimer TOUTES les séances du ${formattedDate} ?`)) {

        function handleSummaryControls(e) {
            const chartToggleBtn = e.target.closest('.exercise-chart-toggle-btn');
            const stepperBtn = e.target.closest('.stepper-btn');
            const resistanceSelect = e.target.closest('.selected-resistance');
            const resistanceOption = e.target.closest('.resistance-options li');
            const trackingToggle = e.target.closest('.tracking-type-toggle button');

            if (chartToggleBtn) {
                const idx = chartToggleBtn.dataset.index;
                const container = document.getElementById(`prog-chart-container-${idx}`);
                if (container) {
                    const isOpening = !container.classList.contains('visible');
                    container.classList.toggle('visible', isOpening);
                    chartToggleBtn.classList.toggle('active', isOpening);
                    if (isOpening) {
                        renderExerciseProgressionChart(`prog-chart-${idx}`, chartToggleBtn.dataset.exerciseName, chartToggleBtn.dataset.sessionName);
                    } else {
                        destroyChart(`prog-chart-${idx}`);
                    }
                }
                return;
            }

            if (stepperBtn) {
                const stepperControl = stepperBtn.closest('.stepper-control');
                const valueEl = stepperControl.querySelector('.stepper-value');
                if (!valueEl) return;
                
                let value = parseFloat(valueEl.textContent);
                const type = stepperControl.dataset.type;
                const isPlus = stepperBtn.classList.contains('stepper-plus');
                // 0.1 step for elastique or sac (data-res-type), 0.5 for heavy weights
                const parentResType = stepperControl.dataset?.resType
                    || stepperControl.closest('.resistance-controls')?.querySelector('.resistance-selector')?.dataset?.type
                    || 'poids';
                // Also use 0.1 if current value < 15 (likely sac/small weights)
                const currentVal2 = parseFloat(stepperControl.querySelector('.stepper-value')?.textContent || '10');
                const step = type === 'weight'
                    ? (parentResType === 'elastique' || currentVal2 < 15 ? 0.1 : 0.5)
                    : 1;

                value = isPlus ? value + step : Math.max(0, value - step);
                // Round to avoid float drift (0.1+0.1+0.1 != 0.3)
                value = Math.round(value * 10) / 10;
                valueEl.textContent = (type === 'weight') ? value.toFixed(1).replace(/\.0$/, '') : value;
            } else if (resistanceSelect) {
                const selector = resistanceSelect.closest('.resistance-selector');
                document.querySelectorAll('.resistance-selector.open').forEach(el => { if(el !== selector) el.classList.remove('open'); });
                selector.classList.toggle('open');
            } else if (resistanceOption) {
                const selector = resistanceOption.closest('.resistance-selector');
                const value = resistanceOption.dataset.value;
                selector.dataset.type = value;
                const resistanceInfo = resistanceTypes[value];
                selector.querySelector('.selected-resistance span').textContent = `${resistanceInfo.emoji} ${resistanceInfo.text}`;
                selector.classList.remove('open');
                const weightStepper = selector.closest('.resistance-controls').querySelector('.stepper-control[data-type="weight"]');
                if(weightStepper) weightStepper.style.display = ['poids', 'elastique', 'poids_elastique'].includes(value) ? 'flex' : 'none';
            } else if (trackingToggle) {
                const parent = trackingToggle.parentElement;
                parent.querySelectorAll('button').forEach(btn => btn.classList.remove('active'));
                trackingToggle.classList.add('active');

                const summaryItem = trackingToggle.closest('.summary-item');
                const newType = trackingToggle.dataset.value;
                const isTimed = newType === 'time';
                
                const perfLabel = summaryItem.querySelector('[data-type="reps-time"]');
                if (perfLabel) {
                    const valueEl = perfLabel.querySelector('.stepper-value');
                    const currentVal = parseInt(valueEl.textContent);
                    valueEl.textContent = isTimed ? (currentVal < 10 ? 30 : currentVal) : (currentVal > 30 ? 10 : currentVal);
                }
            }
        }

    </script>
